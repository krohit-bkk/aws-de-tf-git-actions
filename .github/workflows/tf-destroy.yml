name: Terraform Destroy

on:
  workflow_dispatch:    # Manual trigger only! Never auto-runs!
    inputs:
      confirm_destroy:
        description: 'Type DESTROY to confirm'
        required: true

jobs:
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm_destroy != 'DESTROY' }}
        run: |
          echo "You must type DESTROY to confirm!"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        env:
          TF_VAR_account_id:     ${{ secrets.TF_VAR_account_id }}
          TF_VAR_s3_bucket_name: ${{ secrets.TF_VAR_s3_bucket_name }}
          TF_VAR_project_name:   ${{ secrets.TF_VAR_project_name }}
          TF_VAR_aws_region:     ${{ secrets.AWS_REGION }}