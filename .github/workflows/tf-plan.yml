name: Terraform Plan

on:
  pull_request:
    branches:
      - main

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 - Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      # Step 3 - Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Step 4 - Terraform Init
      - name: Terraform Init
        run: terraform init

      # Step 5 - Terraform Validate
      - name: Terraform Validate
        run: terraform validate

      # Step 6 - Terraform Plan
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color
        env:
          TF_VAR_account_id:     ${{ secrets.TF_VAR_account_id }}
          TF_VAR_s3_bucket_name: ${{ secrets.TF_VAR_s3_bucket_name }}
          TF_VAR_project_name:   ${{ secrets.TF_VAR_project_name }}
          TF_VAR_aws_region:     ${{ secrets.AWS_REGION }}
        continue-on-error: true

      # Step 7 - Post plan output as PR comment
      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan Result
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Triggered by: @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      # Step 8 - Fail if plan failed
      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1